<svg width="1024" height="1024" viewBox="0 0 1024 1024" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Artist Discovery App Icon</title>
  <desc>Headphones encircling a colorful globe, polished pop style on sky blue background</desc>

  <defs>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="#0EA5E9"/>

  <!-- Subtle inner bg circle for depth -->
  <circle cx="512" cy="512" r="440" fill="#0284C7" opacity="0.45" clip-path="url(#iconClip)"/>

  <!-- GLOBE -->
  <circle cx="512" cy="512" r="292" fill="#1D4ED8"/>

  <!-- Latitude lines -->
  <ellipse cx="512" cy="512" rx="292" ry="85" fill="none" stroke="#93C5FD" stroke-width="4.8" opacity="0.55"/>
  <ellipse cx="512" cy="414" rx="255" ry="61" fill="none" stroke="#93C5FD" stroke-width="4" opacity="0.35"/>
  <ellipse cx="512" cy="610" rx="255" ry="61" fill="none" stroke="#93C5FD" stroke-width="4" opacity="0.35"/>

  <!-- Longitude lines -->
  <path d="M512 220 Q638 512 512 804" fill="none" stroke="#93C5FD" stroke-width="4.8" opacity="0.4"/>
  <path d="M512 220 Q386 512 512 804" fill="none" stroke="#93C5FD" stroke-width="4.8" opacity="0.4"/>
  <line x1="220" y1="512" x2="804" y2="512" stroke="#93C5FD" stroke-width="4" opacity="0.35"/>

  <!-- Land masses -->
  <ellipse cx="385" cy="424" rx="61" ry="41" fill="#34D399" opacity="0.95" transform="rotate(-15 385 424)"/>
  <ellipse cx="547" cy="402" rx="37" ry="53" fill="#34D399" opacity="0.95" transform="rotate(10 547 402)"/>
  <ellipse cx="600" cy="456" rx="53" ry="37" fill="#34D399" opacity="0.90" transform="rotate(-8 600 456)"/>
  <ellipse cx="422" cy="571" rx="37" ry="49" fill="#FCD34D" opacity="0.90" transform="rotate(5 422 571)"/>
  <ellipse cx="588" cy="587" rx="41" ry="29" fill="#FCD34D" opacity="0.85" transform="rotate(-10 588 587)"/>

  <!-- Globe rim light -->
  <path d="M367 295 Q278 382 282 496" fill="none" stroke="#BFDBFE" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

  <!-- HEADPHONES -->
  <!-- Band arc -->
  <path d="M310 512 Q310 248 512 228 Q714 248 714 512" fill="none" stroke="#F9A8D4" stroke-width="41" stroke-linecap="round"/>
  <!-- Band highlight -->
  <path d="M326 492 Q326 264 512 244 Q698 264 698 492" fill="none" stroke="#FDE8F0" stroke-width="12" stroke-linecap="round" opacity="0.5"/>

  <!-- Left ear cup -->
  <rect x="265" y="449" width="122" height="187" rx="61" fill="#F472B6"/>
  <rect x="281" y="477" width="90" height="130" rx="45" fill="#BE185D" opacity="0.35"/>
  <rect x="285" y="481" width="49" height="41" rx="20" fill="#FDE8F0" opacity="0.45"/>

  <!-- Right ear cup -->
  <rect x="637" y="449" width="122" height="187" rx="61" fill="#F472B6"/>
  <rect x="653" y="477" width="90" height="130" rx="45" fill="#BE185D" opacity="0.35"/>
  <rect x="690" y="481" width="49" height="41" rx="20" fill="#FDE8F0" opacity="0.45"/>

  <!-- Music note -->
  <circle cx="756" cy="234" r="41" fill="#FCD34D"/>
  <rect x="792" y="153" width="18" height="82" rx="8" fill="#FCD34D"/>
  <path d="M810 153 Q873 129 873 176 Q873 212 810 196" fill="#FCD34D"/>

  <!-- Sparkle star -->
  <g transform="translate(196,184)">
    <line x1="0" y1="-41" x2="0" y2="41" stroke="#FCD34D" stroke-width="10" stroke-linecap="round"/>
    <line x1="-41" y1="0" x2="41" y2="0" stroke="#FCD34D" stroke-width="10" stroke-linecap="round"/>
    <line x1="-29" y1="-29" x2="29" y2="29" stroke="#FCD34D" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <line x1="29" y1="-29" x2="-29" y2="29" stroke="#FCD34D" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Accent dots -->
  <circle cx="832" cy="726" r="20" fill="#34D399" opacity="0.9"/>
  <circle cx="188" cy="734" r="16" fill="#F472B6" opacity="0.8"/>
  <circle cx="840" cy="270" r="12" fill="#FDE8F0" opacity="0.7"/>
  <circle cx="172" cy="306" r="12" fill="#FCD34D" opacity="0.65"/>
</svg>
